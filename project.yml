name: Weiqi
options:
  bundleIdPrefix: com.cwave
  deploymentTarget:
    iOS: 16.0
targets:
  Weiqi:
    type: application
    platform: iOS
    sources:
      - path: Weiqi
        excludes:
          - external
      - path: ../weiqi/third_party/katago/cpp/core
      - path: ../weiqi/third_party/katago/cpp/game
      - path: ../weiqi/third_party/katago/cpp/dataio
      - path: ../weiqi/third_party/katago/cpp/neuralnet
        excludes:
          - cudabackend.cpp
          - cudautils.cpp
          - trtbackend.cpp
          - metalbackend.cpp
          - metalbackend.swift
          - metallayers.swift
          - openclbackend.cpp
          - openclhelpers.cpp
          - openclkernels.cpp
          - opencltuner.cpp
          - dummybackend.cpp
          - "*.opencl"
      - path: ../weiqi/third_party/katago/cpp/book
      - path: ../weiqi/third_party/katago/cpp/search
      - path: ../weiqi/third_party/katago/cpp/program
      - path: ../weiqi/third_party/katago/cpp/version.cpp
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      SWIFT_OBJC_BRIDGING_HEADER: Weiqi/Weiqi-Bridging-Header.h
      OTHER_LDFLAGS: "-lz"
      OTHER_CPLUSPLUSFLAGS: >
        -std=c++20 -DUSE_EIGEN_BACKEND -DNO_GIT_REVISION -DNO_LIBZIP
        -I../weiqi/third_party/katago/cpp
        -I../weiqi/third_party/katago/cpp/external
        -I../weiqi/third_party/katago/cpp/external/tclap-1.2.5/include
        -I../weiqi/third_party/katago/cpp/external/filesystem-1.5.8/include
        -I../weiqi/third_party/katago/cpp/external/half-2.2.0/include
        -IWeiqi/external/eigen3
    frameworks:
      - CoreGraphics
      - Foundation
      - SwiftUI
