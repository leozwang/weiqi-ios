name: Weiqi
options:
  bundleIdPrefix: com.cwave
  deploymentTarget:
    iOS: 16.0
targets:
  Weiqi:
    type: application
    platform: iOS
    sources:
      - path: Weiqi
        excludes:
          - external
      - path: Weiqi/Assets.xcassets
      - path: Weiqi/external/katago/cpp/core
      - path: Weiqi/external/katago/cpp/game
      - path: Weiqi/external/katago/cpp/dataio
      - path: Weiqi/external/katago/cpp/neuralnet
        excludes:
          - cudabackend.cpp
          - cudautils.cpp
          - trtbackend.cpp
          - metalbackend.cpp
          - metalbackend.swift
          - metallayers.swift
          - openclbackend.cpp
          - openclhelpers.cpp
          - openclkernels.cpp
          - opencltuner.cpp
          - dummybackend.cpp
          - "*.opencl"
      - path: Weiqi/external/katago/cpp/book
      - path: Weiqi/external/katago/cpp/search
      - path: Weiqi/external/katago/cpp/program
      - path: Weiqi/external/katago/cpp/version.cpp
    settings:
      INFOPLIST_FILE: Weiqi/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.cwave.weiqi
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      SWIFT_OBJC_BRIDGING_HEADER: Weiqi/Weiqi-Bridging-Header.h
      SWIFT_USE_EXPLICIT_MODULE_BUILD: NO
      OTHER_LDFLAGS: "-lz"
      OTHER_CPLUSPLUSFLAGS: >
        -std=c++20 -DUSE_EIGEN_BACKEND -DNO_GIT_REVISION -DNO_LIBZIP
        -Wno-documentation -Wno-documentation-deprecated-sync -Wno-deprecated-anon-enum-enum-conversion
        -Wno-unused-variable -Wno-shorten-64-to-32
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Weiqi/external/katago/cpp
        - $(SRCROOT)/Weiqi/external/katago/cpp/external
        - $(SRCROOT)/Weiqi/external/katago/cpp/external/tclap-1.2.5/include
        - $(SRCROOT)/Weiqi/external/katago/cpp/external/filesystem-1.5.8/include
        - $(SRCROOT)/Weiqi/external/katago/cpp/external/half-2.2.0/include
        - $(SRCROOT)/Weiqi/external/eigen3
    frameworks:
      - CoreGraphics
      - Foundation
      - SwiftUI
